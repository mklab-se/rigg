name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Run the full CI suite before building release artifacts
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  # Build release binaries for each platform
  build:
    name: Build ${{ matrix.target }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd "target/${TARGET}/release"
          tar czf "../../../rigg-${RELEASE_TAG}-${TARGET}.tar.gz" rigg
          cd ../../..
        env:
          TARGET: ${{ matrix.target }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/$env:TARGET/release/rigg.exe" -DestinationPath "rigg-$env:RELEASE_TAG-$env:TARGET.zip"
        env:
          TARGET: ${{ matrix.target }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rigg-${{ matrix.target }}
          path: rigg-${{ github.ref_name }}-${{ matrix.target }}.*

  # Create GitHub Release with all binaries
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  # Update Homebrew tap with new version and SHA256 hashes
  homebrew:
    name: Update Homebrew Tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/mklab-se/rigg/releases/download/${TAG}"

          # Download release artifacts and compute SHA256
          curl -sL "${BASE_URL}/rigg-${TAG}-aarch64-apple-darwin.tar.gz" -o aarch64-darwin.tar.gz
          curl -sL "${BASE_URL}/rigg-${TAG}-x86_64-apple-darwin.tar.gz" -o x86_64-darwin.tar.gz
          curl -sL "${BASE_URL}/rigg-${TAG}-x86_64-unknown-linux-gnu.tar.gz" -o x86_64-linux.tar.gz

          SHA_AARCH64=$(sha256sum aarch64-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64=$(sha256sum x86_64-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum x86_64-linux.tar.gz | cut -d' ' -f1)

          # Generate formula
          cat > formula.rb <<RUBY
          class Rigg < Formula
            desc "Configuration-as-code CLI for Azure AI Search and Microsoft Foundry"
            homepage "https://github.com/mklab-se/rigg"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mklab-se/rigg/releases/download/v#{version}/rigg-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64}"
              else
                url "https://github.com/mklab-se/rigg/releases/download/v#{version}/rigg-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64}"
              end
            end

            on_linux do
              url "https://github.com/mklab-se/rigg/releases/download/v#{version}/rigg-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "rigg"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/rigg --version")
            end
          end
          RUBY

          # Push to homebrew-tap repo via GitHub API
          CONTENT=$(base64 -w 0 < formula.rb)
          FILE_SHA=$(gh api repos/mklab-se/homebrew-tap/contents/Formula/rigg.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/mklab-se/homebrew-tap/contents/Formula/rigg.rb \
              -X PUT \
              -f message="Update rigg to ${VERSION}" \
              -f content="$CONTENT" \
              -f sha="$FILE_SHA" \
              && echo "Homebrew formula updated to ${VERSION}" \
              || echo "::warning::Failed to update Homebrew tap. Add HOMEBREW_TAP_TOKEN secret with repo scope for mklab-se/homebrew-tap."
          else
            echo "::warning::Could not read current Homebrew formula. Skipping tap update."
          fi

  # Publish all crates to crates.io in dependency order
  crates-io:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish rigg-diff
        run: cargo publish -p rigg-diff
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish rigg-core
        run: cargo publish -p rigg-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish rigg-client
        run: cargo publish -p rigg-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish rigg
        run: cargo publish -p rigg
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
